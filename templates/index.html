<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataFill — Fill the gaps. Find the pattern.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: rgba(255,255,255,0.7);
            --card-border: rgba(255,255,255,0.3);
            --text: #1a1a2e;
            --text-secondary: #555;
            --accent: #6c5ce7;
            --accent-hover: #5a4bd1;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --glass-blur: blur(12px);
            --input-bg: rgba(255,255,255,0.9);
            --input-border: rgba(0,0,0,0.1);
            --radius: 16px;
            --transition: 0.25s cubic-bezier(0.2,0,0,1);
        }
        [data-theme="dark"] {
            --bg: #0f0f23;
            --card-bg: rgba(30,30,60,0.6);
            --card-border: rgba(255,255,255,0.08);
            --text: #eaeaea;
            --text-secondary: #aaa;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --input-bg: rgba(20,20,40,0.8);
            --input-border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 20% 20%, rgba(108,92,231,0.05) 0%, transparent 50%);
        }
        .container { max-width: 800px; margin: 0 auto; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.8em; font-weight: 700; letter-spacing: -0.5px; }
        .logo-gradient { background: linear-gradient(135deg, #6c5ce7, #a855f7, #4f46e5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .tagline { color: var(--text-secondary); font-size: 1.1em; margin-top: 8px; }
        .theme-toggle { position: absolute; top: 25px; right: 25px; background: var(--card-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--card-border); border-radius: 50px; padding: 6px; display: flex; align-items: center; gap: 6px; cursor: pointer; box-shadow: var(--shadow); transition: var(--transition); }
        .theme-toggle:hover { transform: scale(1.05); }
        .card { background: var(--card-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
        .card h3 { font-weight: 600; font-size: 1.25em; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(128,128,128,0.15); padding-bottom: 10px; }
        .upload-area { border: 2px dashed rgba(108,92,231,0.3); border-radius: 12px; padding: 30px; text-align: center; transition: border-color 0.2s; background: rgba(108,92,231,0.02); }
        .upload-area:hover { border-color: var(--accent); }
        input[type="file"] { margin-bottom: 10px; }
        input[type="text"], input[type="number"], select, textarea { padding: 12px 16px; border: 1px solid var(--input-border); border-radius: 10px; font-size: 15px; background: var(--input-bg); color: var(--text); transition: var(--transition); width: 100%; outline: none; font-family: 'Inter', sans-serif; }
        textarea { resize: vertical; min-height: 150px; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,92,231,0.15); }
        .btn { padding: 12px 24px; background: linear-gradient(135deg, var(--accent), #7c3aed); color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: var(--transition); text-decoration: none; display: inline-block; box-shadow: 0 4px 12px rgba(108,92,231,0.3); margin-top: 10px; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(108,92,231,0.4); }
        .error-box { background: rgba(239,68,68,0.08); border-left: 4px solid #ef4444; padding: 12px 16px; border-radius: 10px; margin-top: 12px; color: #b91c1c; }
        .footer { text-align: center; color: var(--text-secondary); font-size: 0.85em; padding: 30px 0 10px; opacity: 0.8; }
        @media (max-width: 768px) { .header h1 { font-size: 2em; } .theme-toggle { top: 15px; right: 15px; } }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
        <span id="themeIcon">🌙</span>
        <span id="themeLabel">Dark</span>
    </div>

    <div class="container">
        <div class="header">
            <h1>📊 <span class="logo-gradient">DataFill</span></h1>
            <p class="tagline">Intelligent interpolation for any dataset</p>
        </div>

        {% if error %}
        <div class="card error-box"><strong>Error:</strong> {{ error }}</div>
        {% endif %}

        <!-- Optional client name field (visible on all forms) -->
        <div class="card">
            <h3>👤 Your Reference (optional)</h3>
            <input type="text" form="upload-form" name="client_name" placeholder="e.g., client name or project ID">
            <p style="color:var(--text-secondary); font-size:0.85em; margin-top:8px;">Helps us identify your data if you need support.</p>
        </div>

        <!-- Upload File -->
        <div class="card">
            <h3>📂 Upload File</h3>
            <div class="upload-area">
                <form method="POST" enctype="multipart/form-data" id="upload-form">
                    <input type="file" name="file" accept=".csv,.xlsx,.xls" required>
                    <button type="submit" class="btn">Upload & Continue</button>
                </form>
            </div>
        </div>

        <!-- Manual Data Entry -->
        <div class="card">
            <h3>✍️ Paste Data Manually</h3>
            <form method="POST">
                <textarea name="manual_data" placeholder="Paste your data here (comma or tab separated). First line = column names.&#10;Example:&#10;Time,Temperature&#10;1,22.5&#10;2,23.1&#10;3,22.8" required></textarea>
                <input type="hidden" name="client_name" form="upload-form" value="">
                <button type="submit" class="btn">Submit Data</button>
            </form>
        </div>

        <!-- Stock Fetch (unchanged) -->
        <div class="card">
            <h3>📈 Fetch Stock Data</h3>
            <form action="/fetch_stock" method="POST">
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <input type="text" name="ticker" placeholder="AAPL" value="AAPL" required style="flex:1;">
                    <select name="period" style="flex:1;">
                        <option value="1mo">1 Month</option>
                        <option value="3mo">3 Months</option>
                        <option value="6mo">6 Months</option>
                        <option value="1y">1 Year</option>
                        <option value="2y">2 Years</option>
                    </select>
                    <button type="submit" class="btn" style="flex:0 0 auto;">Fetch & Analyze</button>
                </div>
            </form>
        </div>

        <div class="footer">
            <p>DataFill — Fill the gaps. Find the pattern.</p>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('datafill-theme', next);
            document.getElementById('themeIcon').textContent = next === 'dark' ? '☀️' : '🌙';
            document.getElementById('themeLabel').textContent = next === 'dark' ? 'Light' : 'Dark';
        }
        const saved = localStorage.getItem('datafill-theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
        // sync toggle icon
        if (document.documentElement.getAttribute('data-theme') === 'dark') {
            document.getElementById('themeIcon').textContent = '☀️';
            document.getElementById('themeLabel').textContent = 'Light';
        }
    </script>
</body>
</html>
